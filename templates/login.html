<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In — reEat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo">reEat</div>
            <p class="login-subtitle">Food Redistribution Platform</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" autocomplete="username"
                           placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" autocomplete="current-password"
                           placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn login-submit">Sign In</button>
            </form>

            <div class="login-hint">
                <p><strong>Provider account:</strong> provider / provider123</p>
                <p><strong>Recipient account:</strong> recipient / recipient123</p>
            </div>
        </div>
    </div>
</body>
</html>
